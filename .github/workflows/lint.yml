name: Lint
on:
  pull_request:
  push:
    branches:
      - "*"

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install

      - name: Run biome:validate
        run: |
          cd frontend
          pnpm run biome:validate

  lint-translations:
      name: Lint Translations
      runs-on: ubuntu-24.04
      steps:
        - name: Checkout sources
          uses: actions/checkout@v6

        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
            node-version: "24"

        - name: Setup pnpm
          uses: pnpm/action-setup@v5
          with:
            version: 10
            run_install: false

        - name: Get pnpm store directory
          id: pnpm-cache
          run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

        - name: Setup pnpm cache
          uses: actions/cache@v5
          with:
            path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
            restore-keys: |
              ${{ runner.os }}-pnpm-store-

        - name: Install frontend dependencies
          run: |
            cd frontend
            pnpm install

        - name: Check translations
          run: |
            cd frontend
            failed_files=()
            for file in public/translations/*.json; do
              echo "Checking $file"
              pnpm diff:translations "$file" --check || failed_files+=("$file")
            done
            if [ ${#failed_files[@]} -gt 0 ]; then
              echo ""
              echo "Failed translations:"
              for f in "${failed_files[@]}"; do
                echo "  - $f"
              done
              exit 1
            fi

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Dummy Frontend Files
        run: mkdir -p frontend/dist && echo "Dummy file" > frontend/dist/dummy.txt

      - name: Run cargo clippy
        run: cargo clippy
